{{- if contains .Chart.Name .Values.global.services -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{- if .Values.global.ecrUrl -}}{{ .Values.global.ecrUrl }}/{{ .Chart.Name }}{{- else -}}{{ .Values.image.repository }}{{- end -}}:{{ .Values.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- toYaml .Values.global.env | nindent 14 }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      automountServiceAccountToken: true
{{- end -}}
