{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-gateway-ingress
  annotations:
    # AWS Load Balancer Controller가 Ingress를 처리하도록 지정
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    # HTTPS 포트 443 리스너를 추가하고, HTTP를 HTTPS로 리다이렉트
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    # 발급받은 ACM 인증서의 ARN을 여기에 입력하세요.
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:886331869898:certificate/e2bb3713-157d-46b2-be25-92649d66da72
    # 백엔드 프로토콜은 HTTP로 설정
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    # Nginx Ingress Controller의 rewrite-target은 계속 사용
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.samubozo.co.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-gateway-service
                port:
                  number: {{ .Values.service.port }}
{{- end }}