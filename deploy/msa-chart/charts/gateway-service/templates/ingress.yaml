{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-gateway-ingress
  annotations:
    # --- 컨트롤러 및 기본 설정 ---
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing

    # --- 리스너 및 리다이렉션 설정 ---
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'

    # values.yaml 파일에서 인증서 ARN을 가져오도록 수정
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}

    # --- 백엔드 및 상태 확인 설정 ---
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    # Target Group의 상태 확인 경로를 명시하여 안정성 향상 (서비스의 health check 경로에 맞게 수정)
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthCheckPath | quote }}
    alb.ingress.kubernetes.io/success-codes: '200'
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-gateway-service
                port:
                  # 이 부분이 .Values.service.port 를 참조해야 합니다.
                  number: {{ .Values.service.port }}
{{- end }}