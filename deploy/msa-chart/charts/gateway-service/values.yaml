replicaCount: 1

image:
  repository: 886331869898.dkr.ecr.ap-northeast-2.amazonaws.com/gateway-service
  tag: latest

service:
  type: ClusterIP
  # 백엔드 서비스가 사용하는 포트입니다.
  port: 8000

ingress:
  # Ingress 리소스 생성 여부
  enabled: true

  # 사용할 호스트(도메인) 이름
  host: api.samubozo.co.kr

  # AWS Certificate Manager (ACM)에서 발급받은 인증서의 ARN
  # ALB와 동일한 리전에 있는 인증서여야 합니다.
  certificateArn: arn:aws:acm:ap-northeast-2:886331869898:certificate/e2bb3713-157d-46b2-be25-92649d66da72

  # ALB Target Group이 파드의 상태를 확인할 때 사용할 경로
  # Spring Boot Actuator를 사용한다면 보통 아래 경로를 사용합니다.
  healthCheckPath: /actuator/health