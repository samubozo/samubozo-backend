# Helm 차트에서 사용할 전역 값들을 정의하는 곳.
# 나중에 생성할 템플릿 파일에 적용할 공통 값을 세팅하는 곳.

#클러스터 내에서 docker image를 ecr에서 pull 할때 사용할 계정 정보
#Secret 오브젝트로 생성했고, 그 오브젝트의 이름이 ecr-secret
imagePullSecrets:
  - name: ecr-secret

#모든 서비스에서 공통적으로 사용할 값들을 정의
global:
  ecrUrl: ""
  services: "approval-service,attendance-service,auth-service,certificate-service,chatbot-service,config-service,gateway-service,hr-service,message-service,notification-service,payroll-service,schedule-service,vacation-service"
  image:
    tag: latest
  #모든 서비스에서 사용할 공통 환경변수
  env:
    - name: TZ
      value: Asia/Seoul
    - name: SPRING_PROFILES_ACTIVE
      value: dev,kubernetes
    - name: SPRING_CLOUD_CONFIG_URI
      value: http://config-service:8888
    - name: SPRING_CLOUD_CONFIG_PROFILE_ACTIVE
      value: default,kubernetes

  #모든 서비스에서 공통적으로 사용할 리소스 제한
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  #모든 서비스에서 공통적으로 사용할 프로브 설정
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /actuator/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

#각 서비스별로 개별적으로 설정할 값들을 정의
#이 값들은 각 서비스의 values.yaml 파일에서 오버라이딩 될 수 있음
