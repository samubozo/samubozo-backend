# Helm 차트에서 사용할 전역 값들을 정의하는 곳.
# 나중에 생성할 템플릿 파일에 적용할 공통 값을 세팅하는 곳.

#클러스터 내에서 docker image를 ecr에서 pull 할때 사용할 계정 정보
#Secret 오브젝트로 생성했고, 그 오브젝트의 이름이 ecr-secret
imagePullSecrets:
  - name: ecr-secret

#모든 서비스에서 공통적으로 사용할 값들을 정의
global:
  #모든 서비스에서 사용할 공통 환경변수
  env:
    - name: TZ
      value: Asia/Seoul
    - name: SPRING_PROFILES_ACTIVE
      value: k8s
    - name: SPRING_CLOUD_KUBERNETES_DISCOVERY_ENABLED
      value: "true"
    - name: SPRING_CLOUD_KUBERNETES_RELOAD_ENABLED
      value: "true"
    - name: SPRING_CLOUD_KUBERNETES_RELOAD_MODE
      value: "event"
    - name: SPRING_CLOUD_KUBERNETES_RELOAD_STRATEGY
      value: "refresh"
    - name: SPRING_CLOUD_KUBERNETES_DISCOVERY_INCLUDE_NOT_READY
      value: "true"
    - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
      value: "health,info,refresh,bus-refresh"
    - name: SPRING_CLOUD_BUS_ENABLED
      value: "true"
    - name: SPRING_CLOUD_BUS_DESTINATION
      value: "config-bus"
    - name: SPRING_RABBITMQ_HOST
      value: "rabbitmq"
    - name: SPRING_RABBITMQ_PORT
      value: "5672"
    - name: SPRING_RABBITMQ_USERNAME
      value: "user"
    - name: SPRING_RABBITMQ_PASSWORD
      value: "password"
    - name: LOGGING_LEVEL_ROOT
      value: "info"
    - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD
      value: "debug"
    - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB
      value: "debug"
    - name: LOGGING_LEVEL_COM_SAMUBOZO
      value: "debug"

  #모든 서비스에서 공통적으로 사용할 리소스 제한
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  #모든 서비스에서 공통적으로 사용할 프로브 설정
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /actuator/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

#각 서비스별로 개별적으로 설정할 값들을 정의
#이 값들은 각 서비스의 values.yaml 파일에서 오버라이딩 될 수 있음
