server:
  port: 0 # serverлҠ” Mapмқҙкі , portлҠ” к·ё Mapмқҳ нӮӨмһ…лӢҲлӢӨ.

spring:
  application: # springмқҖ Mapмқҙкі , applicationмқҖ к·ё Mapмқҳ нӮӨмһ…лӢҲлӢӨ.
    name: schedule-service # applicationмқҖ Mapмқҙкі , nameмқҖ к·ё Mapмқҳ нӮӨмһ…лӢҲлӢӨ.
  cloud:
    kubernetes:
      client:
        namespace: ${POD_NAMESPACE}
        pod-name: ${POD_NAME}
      discovery:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true

  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none